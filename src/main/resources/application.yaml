bloomshield:
  cache:
    ttl-seconds: 3600 # Time to live for cache entries in seconds

spring:
  application:
    name: bloom-shield

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: bloom
    password: bloom
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect